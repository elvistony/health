<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment Details - Vital Track</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css" />
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
  <div class="app-wrapper">
    
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button"><i class="bi bi-list"></i></a>
          </li>
        </ul>
      </div>
    </nav>
    
    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
         <a href="../index.html" class="brand-link"><span class="brand-text fw-light">Vital Track</span></a>
      </div>
      <div class="sidebar-wrapper">
         <nav class="mt-2">
            <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview">
               <li class="nav-item"><a class="nav-link" href="../visits/index.html"><i class="nav-icon bi bi-arrow-left"></i><p>Back to Visits</p></a></li>
            </ul>
         </nav>
      </div>
    </aside>
    
    <main class="app-main">
      <div class="app-content p-4">
        
        <div class="mb-4">
          <h2 id="appointment-title">Loading Appointment...</h2>
          <p id="appointment-date" class="text-muted"></p>
        </div>

        <div id="appointment-details">
          <div class="premium-card" id="general-info" style="display:none;">
            <h5 class="fw-bold mb-3">General Information</h5>
            <ul id="info-list" class="list-unstyled mb-0"></ul>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-md-6">
              <div class="premium-card h-100" id="related-meds">
                <h5 class="fw-bold mb-3">Medications Prescribed</h5>
                <ul id="meds-list" class="list-group list-group-flush">
                  <li class="list-group-item text-center text-muted border-0"><div class="spinner-border spinner-border-sm" role="status"></div> Loading...</li>
                </ul>
              </div>
            </div>

            <div class="col-md-6">
              <div class="premium-card h-100" id="related-labs">
                <h5 class="fw-bold mb-3">Lab Reports</h5>
                <ul id="labs-list" class="list-group list-group-flush">
                  <li class="list-group-item text-center text-muted border-0"><div class="spinner-border spinner-border-sm" role="status"></div> Loading...</li>
                </ul>
              </div>
            </div>
          </div>

          <div class="premium-card" id="related-ailments">
            <h5 class="fw-bold mb-3">Diagnosed Ailments</h5>
            <ul id="ailments-list" class="list-group list-group-flush">
              <li class="list-group-item text-center text-muted border-0"><div class="spinner-border spinner-border-sm" role="status"></div> Loading...</li>
            </ul>
          </div>
        </div>

      </div>
    </main>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/js/adminlte.min.js"></script>

  <script src="../shared/api.js"></script>
  <script src="app.js"></script>
</body>
</html>
