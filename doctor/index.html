<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Profile - Vital Track</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css" />
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
  <div class="app-wrapper">
    
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button"><i class="bi bi-list"></i></a>
          </li>
        </ul>
      </div>
    </nav>
    
    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
         <a href="../index.html" class="brand-link"><span class="brand-text fw-light">Vital Track</span></a>
      </div>
      <div class="sidebar-wrapper">
         <nav class="mt-2">
            <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview">
               <li class="nav-item"><a class="nav-link" href="../doctors/index.html"><i class="nav-icon bi bi-arrow-left"></i><p>Back to Doctors</p></a></li>
            </ul>
         </nav>
      </div>
    </aside>
    
    <main class="app-main">
      <div class="app-content p-4">
        
        <div class="mb-4">
          <h2 id="doctor-name">Loading Doctor Profile...</h2>
          <p id="doctor-specialty" class="text-muted"></p>
        </div>

        <div class="row g-4">
          <div class="col-md-5">
            <div class="premium-card h-100" id="doctor-info" style="display:none;">
              <h5 class="fw-bold mb-3">Contact & Info</h5>
              <ul id="info-list" class="list-unstyled mb-0"></ul>
            </div>
          </div>

          <div class="col-md-7">
            <div class="premium-card h-100" id="doctor-visits">
              <h5 class="fw-bold mb-3">Consultation History</h5>
              <ul id="visits-list" class="list-group list-group-flush">
                <li class="list-group-item text-center text-muted border-0"><div class="spinner-border spinner-border-sm" role="status"></div> Loading...</li>
              </ul>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/js/adminlte.min.js"></script>

  <script src="../shared/api.js"></script>
  <script>
    window.addEventListener('load', async () => {
      const docId = window.location.hash.substring(1);
      if(!docId) {
        document.getElementById('doctor-name').innerText = "No Doctor ID provided.";
        return;
      }
      try {
        const [doctors, visits] = await Promise.all([
          API.fetchData('Doctors'),
          API.fetchData('Visits')
        ]);
        const doctor = doctors.find(d => d.id === docId || d.Name === docId);
        
        if(!doctor) {
          document.getElementById('doctor-name').innerText = "Doctor not found.";
          return;
        }

        document.getElementById('doctor-name').innerText = doctor.Name || "Doctor";
        document.getElementById('doctor-specialty').innerText = doctor.Specialty || doctor.Department || '';

        document.getElementById('doctor-info').style.display = 'block';
        document.getElementById('info-list').innerHTML = `
          <li class="mb-2"><strong>Hospital:</strong> <span class="text-muted">${doctor.Hospital || doctor.Clinic || 'N/A'}</span></li>
          <li class="mb-2"><strong>Contact:</strong> <span class="text-muted">${doctor.Contact || doctor.Phone || 'N/A'}</span></li>
          <li><strong>Notes:</strong> <span class="text-muted">${doctor.Notes || doctor.Remarks || 'N/A'}</span></li>
        `;

        const relatedVisits = visits.filter(v => 
          (v['Doctor ID'] && (v['Doctor ID'].data === doctor.Name || v['Doctor ID'] === doctor.Name || v['Doctor ID'] === docId))
        );

        const vList = document.getElementById('visits-list');
        if(relatedVisits.length === 0) {
          vList.innerHTML = "<li class='list-group-item text-muted border-0 px-0'>No visits recorded with this doctor.</li>";
        } else {
          vList.innerHTML = relatedVisits.map(v => `
            <li class="list-group-item px-0 py-3 d-flex justify-content-between align-items-center">
              <div>
                <strong>${new Date(v.Date).toLocaleDateString()}</strong> - ${v.Title || v['Visit Type']}
              </div>
              <a href="../appointment/index.html#${v.id}" class="btn btn-sm btn-outline-primary">View Details</a>
            </li>
          `).join('');
        }
      } catch (e) {
        console.error(e);
        document.getElementById('doctor-name').innerText = "Error loading data.";
      }
    });
  </script>
</body>
</html>
