<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Vital Track</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 400px;
    }
    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo text-center mb-4">
      <h1 class="fw-bold text-primary">Vital Track</h1>
    </div>
    <div class="card">
      <div class="card-body login-card-body p-4">
        <p class="login-box-msg text-center text-muted mb-4">Sign in to start your session</p>

        <form id="login-form">
          <!-- We don't need User ID anymore, just the key -->
          <div class="input-group mb-3">
            <input type="password" class="form-control" id="login-key" placeholder="Authentication Key" required>
            <div class="input-group-text">
              <i class="bi bi-lock"></i>
            </div>
          </div>
          
          <div id="login-error" class="alert alert-danger" style="display:none; font-size: 0.9rem;">Invalid Key.</div>

          <div class="row">
            <div class="col-12">
              <button type="submit" id="login-btn" class="btn btn-primary w-100">Sign In</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <script src="../shared/api.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      const key = document.getElementById('login-key').value.trim();
      
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Authenticating...';

      const authData = await API.login(key);

      if (authData && authData.role) {
        // Success
        sessionStorage.setItem('vt_auth', authData.role);
        sessionStorage.setItem('vt_patient', authData.patient);
        sessionStorage.setItem('vt_key', key);
        window.location.replace('../index.html');
      } else {
        // Failure
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
