<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ailments - Vital Track</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css" />
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
  <div class="app-wrapper">
    
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button"><i class="bi bi-list"></i></a>
          </li>
        </ul>
      </div>
    </nav>
    
    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
         <a href="../index.html" class="brand-link"><span class="brand-text fw-light">Vital Track</span></a>
      </div>
      <div class="sidebar-wrapper">
         <nav class="mt-2">
            <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview">
               <li class="nav-item"><a class="nav-link" href="../index.html"><i class="nav-icon bi bi-arrow-left"></i><p>Back Home</p></a></li>
               <li class="nav-item"><a class="nav-link active" href="index.html"><i class="nav-icon bi bi-bug"></i><p>Ailments</p></a></li>
            </ul>
         </nav>
      </div>
    </aside>
    
    <main class="app-main">
      <div class="app-content p-4">
        
        <div id="table-view"></div>

        <div id="modal-view" class="custom-modal-overlay" style="display: none;">
          <div class="custom-modal">
            <h3 id="modal-title" class="mb-4">Record Details</h3>
            <form id="record-form">
              <!-- Dynamic fields go here -->
            </form>
          </div>
        </div>

      </div>
    </main>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/js/adminlte.min.js"></script>

  <script src="../shared/api.js"></script>
  <script src="../shared/table.js"></script>
  <script src="../shared/form.js"></script>
  <script>
    renderGenericTable("Ailments", "table-view");
    window.addEventListener('hashchange', handleHash);
    function handleHash() {
      const hash = window.location.hash.substring(1);
      const tableView = document.getElementById('table-view');
      const modalView = document.getElementById('modal-view');
      if (!hash) {
        tableView.style.display = 'block';
        modalView.style.display = 'none';
      } else if (hash === 'new') {
        document.getElementById('modal-title').innerText = "Add New Ailment";
        modalView.style.display = 'flex';
        generateForm("Ailments", "new", "record-form");
      } else {
        document.getElementById('modal-title').innerText = `Editing Record`;
        modalView.style.display = 'flex';
        generateForm("Ailments", hash, "record-form");
      }
    }
  </script>
</body>
</html>
